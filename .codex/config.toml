# 어떤 AI 모델을 사용할지 지정한다.
# "gpt-5.4-mini"는 빠르고 가벼운 모델로, 일반적인 코드 작업에 충분하다.
# 다른 선택지: "gpt-5.4" (더 강력), "gpt-4.1" (구세대 고성능), "o3" (최고 추론 성능).
# 더 강력한 모델일수록 품질은 높아지지만 응답 속도가 느려지고 비용이 증가한다.
model = "gpt-5.4-mini"

# 일반 작업 중 모델이 얼마나 깊이 생각할지를 조절한다.
# "medium"은 속도와 품질의 균형점으로, 대부분의 코드 수정·탐색 작업에 적합하다.
# 다른 선택지: "low" (빠르지만 단순한 추론), "high" (느리지만 복잡한 문제에 강함).
# 예: 단순 버그 수정은 low로도 충분하고, 아키텍처 설계라면 high가 낫다.
model_reasoning_effort = "medium"

# 계획(plan) 단계에서만 적용되는 추론 깊이를 별도로 설정한다.
# "high"로 설정하면 실행 전 계획을 최대한 꼼꼼히 세워 실수를 줄인다.
# 다른 선택지: "low" (계획을 간략히 스케치), "medium" (표준 계획 수립).
# 실행보다 계획이 더 중요한 작업(대규모 리팩토링 등)에서 효과적이다.
plan_mode_reasoning_effort = "high"

# Codex가 파일 시스템에 접근할 수 있는 범위를 제한한다.
# "workspace-write"는 프로젝트 루트 내부에서만 읽기·쓰기를 허용한다.
# 다른 선택지: "read-only" (수정 불가), "workspace-read" (프로젝트 내 읽기만), "unrestricted" (시스템 전체 접근).
# workspace-write보다 넓히면 프로젝트 밖 파일을 수정할 위험이 생기므로 주의한다.
sandbox_mode = "workspace-write"

# 어떤 시점에 사용자 승인을 요청할지 결정한다.
# "on-request"는 rules 파일에서 prompt로 지정된 명령에 대해서만 확인을 요청한다.
# 다른 선택지: "always" (모든 액션마다 확인), "never" (확인 없이 전부 자동 실행).
# "never"는 편리하지만 위험한 명령도 자동으로 실행되므로 프로덕션 환경에는 비적합하다.
approval_policy = "on-request"

[agents]

# 동시에 실행할 수 있는 에이전트(서브태스크) 스레드 수를 설정한다.
# 4는 최대 4개의 작업을 병렬로 처리할 수 있음을 의미한다.
# 다른 선택지: 1 (순차 실행), 2 (가벼운 병렬), 8 (고성능 병렬).
# 높일수록 병렬 처리가 빨라지지만, 서로 간섭할 위험도 커진다.
max_threads = 4

# 에이전트가 하위 에이전트를 몇 단계까지 생성할 수 있는지 제한한다.
# 1은 에이전트가 도구를 직접 호출만 할 수 있고, 또 다른 에이전트를 생성할 수 없음을 의미한다.
# 다른 선택지: 0 (에이전트 비활성화), 2 (에이전트가 하위 에이전트 1단계 생성 가능), 3+.
# 깊이가 깊어질수록 복잡한 자동화가 가능하지만 동작 추적이 어려워진다.
max_depth = 1

# 하나의 작업(job)이 실행될 수 있는 최대 시간을 초 단위로 설정한다.
# 1800초(30분)를 초과하면 작업이 강제 종료된다.
# 다른 선택지: 300 (5분, 빠른 실패 감지), 600 (10분), 3600 (1시간, 장시간 작업 허용).
# 너무 길게 설정하면 무한 루프에 빠진 작업이 오래 방치될 수 있다.
job_max_runtime_seconds = 1800
